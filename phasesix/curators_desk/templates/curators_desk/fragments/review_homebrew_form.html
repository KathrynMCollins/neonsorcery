{% load i18n %}
{% load django_bootstrap5 %}

<div id="homebrew-form-body-{{ model_name }}-{{ object.id }}">
  <form method="post"
        enctype="multipart/form-data"
        hx-post="{% url 'curators_desk:update_homebrew' %}"
        hx-target="#homebrew-form-wrapper-{{ model_name }}-{{ object.id }}"
        hx-swap="innerHTML"
        hx-encoding="multipart/form-data">
    {% csrf_token %}
    <input type="hidden" name="model_name" value="{{ model_name }}">
    <input type="hidden" name="object_id" value="{{ object.id }}">
    {% bootstrap_form object.review_form %}
    <div class="d-flex flex-wrap align-items-center justify-content-end gap-2">
      {% if request.user.is_authenticated and request.user.profile.may_use_ai %}
        <button type="button"
                class="btn btn-outline-secondary btn-sm"
                hx-post="{% url 'curators_desk:translate_homebrew' %}"
                hx-include="closest form"
                hx-target="#homebrew-form-body-{{ model_name }}-{{ object.id }}"
                hx-swap="outerHTML"
                hx-indicator="#translate-indicator-{{ model_name }}-{{ object.id }}"
                hx-disabled-elt="this">
          {% trans 'Translate' %}
          <span id="translate-indicator-{{ model_name }}-{{ object.id }}"
                class="htmx-indicator spinner-border spinner-border-sm ms-2"
                role="status"
                aria-hidden="true"></span>
        </button>
        {% if object.has_image_field %}
          <button type="button"
                  class="btn btn-outline-secondary btn-sm"
                  hx-post="{% url 'curators_desk:generate_homebrew_image' %}"
                  hx-include="closest form"
                  hx-target="#homebrew-form-body-{{ model_name }}-{{ object.id }}"
                  hx-swap="outerHTML"
                  hx-indicator="#image-indicator-{{ model_name }}-{{ object.id }}"
                  hx-disabled-elt="this">
            {% trans 'Create image' %}
            <span id="image-indicator-{{ model_name }}-{{ object.id }}"
                  class="htmx-indicator spinner-border spinner-border-sm ms-2"
                  role="status"
                  aria-hidden="true"></span>
          </button>
        {% endif %}
      {% endif %}
      <button type="submit"
              class="btn btn-outline-secondary btn-sm"
              >
        {% trans 'Save' %}
      </button>
      <button type="submit"
              class="btn btn-primary btn-sm"
              name="post_save_action"
              value="accept"
              hx-target="#homebrew-table-{{ model_name }}"
              hx-swap="outerHTML">
        {% trans 'Save and accept' %}
      </button>
      <button type="submit"
              class="btn btn-outline-primary btn-sm"
              name="post_save_action"
              value="keep"
              hx-target="#homebrew-table-{{ model_name }}"
              hx-swap="outerHTML">
        {% trans 'Save and keep as Homebrew' %}
      </button>
    </div>
  </form>
</div>
