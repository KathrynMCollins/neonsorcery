{% load campaign_extras i18n %}<div class="ws-dice-result">
{% if roll.complete_fumble %}<div class="complete-fumble-banner">{% trans "Complete Fumble" %}</div>{% endif %}
{% for r in roll.get_dice_list %}
    <span class="dice-box mb-1 me-1 d-flex align-items-center justify-content-center {% if r == 1 %}mistake{% elif r > 10 %}crit{% elif r > 6 and r <= 10 %}success{% elif r < 6 and r >= roll.minimum_roll %}success{% else %}fail{% endif %}">{{ r }}</span>
{% endfor %}
{% if roll.modifier %}<span class="text-muted"> {{ roll.modifier|int_with_sign }}</span>{% endif %}
<span class="text-muted">= {{ roll.get_sum }}</span>
</div>
