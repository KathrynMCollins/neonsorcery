{% load i18n %}
{% load portal_extras %}
<div class="list-group mb-3">
  <a
    class="py-3 navigation-link active pointer list-group-item list-group-item-action d-flex justify-content-between align-items-center"
    data-bs-toggle="tab"
    data-bs-target="#v-overview"
    role="tab"
    aria-current="false">
    <div class="d-flex justify-content-center align-items-center">
      <i class="fas fa-user-alt"></i>
      <span class="ms-3 d-block d-lg-block">{% trans "Dramaturgy" %}</span>
    </div>
  </a>

  <a
    class="py-3 navigation-link pointer list-group-item list-group-item-action d-flex justify-content-between align-items-center"
    data-bs-toggle="tab"
    data-bs-target="#v-homebrew"
    role="tab"
    aria-current="false">
    <div class="d-flex justify-content-center align-items-center">
      <i class="fas fa-box"></i>
      <span class="ms-3 d-block d-lg-block">{% trans "Homebrew" %}</span>
    </div>
  </a>

  <a
    class="py-3 navigation-link pointer list-group-item list-group-item-action d-flex justify-content-between align-items-center"
    data-bs-toggle="tab"
    data-bs-target="#v-statistics"
    role="tab"
    aria-current="false">
    <div class="d-flex justify-content-center align-items-center">
      <i class="fas fa-chart-bar"></i>
      <span class="ms-3 d-block d-lg-block">{% trans "Statistics" %}</span>
    </div>
  </a>

  <a
    class="py-3 navigation-link pointer list-group-item list-group-item-action d-flex justify-content-between align-items-center"
    data-bs-toggle="tab"
    data-bs-target="#v-settings"
    role="tab"
    aria-current="true">
    <div class="d-flex justify-content-center align-items-center">
      <i class="fas fa-edit"></i>
      <span class="ms-3 d-block d-lg-block">{% trans "Settings" %}</span>
    </div>
  </a>
</div>

{% if may_edit %}
  <div class="list-group mb-3">
    <div class="list-group-item py-3"
         data-sidebar-right-title="{{ object }}"
         data-sidebar-right-url="{% url 'campaigns:xhr_sidebar' pk=object.id sidebar_template="roll" %}"
         role="button">

      <div class="d-flex align-items-center">
        <i class="fas fa-fw fa-dice-d6"></i>
        <span class="ms-3 d-block d-lg-block">{% trans "Roll" %}</span>
      </div>
    </div>
  </div>
{% endif %}
